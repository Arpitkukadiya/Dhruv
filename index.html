<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation - Dhruv Jetpariya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1604908177522-4295a6a6f5d2');
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Container */
.container {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 1.2s ease;
}

/* Heading */
h1 {
    font-size: 24px;
    margin-bottom: 8px;
    animation: slideDown 1s ease;
}

.subtitle {
    font-size: 14px;
    margin-bottom: 10px;
    color: #ffd700;
}

/* Images */
.image-box {
    width: 220px;
    height: 220px;
    margin: 10px auto;
    border-radius: 20px;
    overflow: hidden;
    border: 3px solid #fff;
    box-shadow: 0 5px 20px rgba(0,0,0,0.6);
    animation: zoomIn 1.2s ease;
}

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Details */
.details {
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.6;
}

.highlight {
    color: #ffcc00;
    font-weight: bold;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    background: linear-gradient(45deg, #ff9800, #ff5722);
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* Footer */
.footer {
    margin-top: 12px;
    font-size: 12px;
    opacity: 0.8;
}

/* Animations */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes slideDown {
    from {opacity:0; transform: translateY(-20px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes zoomIn {
    from {opacity:0; transform: scale(0.7);}
    to {opacity:1; transform: scale(1);}
}

/* Responsive */
@media(max-width:400px){
    .image-box{
        width:180px;
        height:180px;
    }
    h1{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>🎉 Special Invitation</h1>
    <div class="subtitle">💼 Professional Meet & Gathering</div>

    <!-- Profile Image -->
    <div class="image-box">
        <img src="Dhruv.PNG" alt="Dhruv">
    </div>

    <div class="details">
        <p class="highlight">👤 Dhruv Jetpariya (Patel)</p>
        <p>🏢 Department: <span class="highlight">ISG Monitoring</span></p>
        <p>💻 Designation: <span class="highlight">System Support Engineer</span></p>
    </div>

    <!-- Ras-Puri Section -->
    <div class="subtitle">🍽️ Ras-Puri Feast</div>

    <div class="image-box">
        <img src="a1.png" alt="Ras Puri">
    </div>

    <div class="details">
        <p class="highlight">🥭 Aamras & Puri Special 🍛</p>
        <p>📅 Date: <span class="highlight">Sunday</span></p>
        <p>⏰ Time: <span class="highlight">12:30 PM</span></p>
        <p>💛 Enjoy food, fun & family vibes!</p>
    </div>

    <button class="btn" onclick="joinEvent()">🎉 Join Us</button>

    <div class="footer">
        Made with ❤️ | By ❤️❤️❤️❓️
    </div>

</div>

<script>
function joinEvent(){
    alert("🎉 Welcome! See you at the Ras-Puri feast!");
}

/* Small animation boost */
window.onload = () => {
    document.querySelectorAll('.image-box').forEach((img, i) => {
        img.style.animationDelay = (i * 0.3) + "s";
    });
};
</script>

</body>
</html>
