<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f7f8;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 25px;
            color: #222;
            font-size: 28px;
        }

        .square-image {
            width: 300px;
            height: 300px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .square-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Dhruv Patel</h1>

        <div class="square-image">
            <img src="Dhruv.PNG" alt="Dhruv Photo">
        </div>
    </div>

</body>
</html>
