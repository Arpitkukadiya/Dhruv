<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Page</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f7f8;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .square-image {
            width: 250px;
            height: 250px;
            overflow: hidden;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .square-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* keeps image perfectly square */
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Arpit Kukadiya</h1>

        <div class="square-image">
            <img src="dhruv.png" alt="Profile Photo">
        </div>
    </div>

</body>
</html>
